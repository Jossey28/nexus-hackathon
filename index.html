<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bird</title>
<link rel="icon" type="image/png" href="/favicon.png">
<style>
@font-face {
  font-family: 'FF Confidential';
  src: url('/fonts/Confidential-Regular.ttf') format('truetype');
}
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #000;
  font-family: 'FF Confidential', 'Anton', sans-serif;
  color: white;
  text-align: center;
}
.greg-viking {
  width: 32px;
  height: 32px;
  background-image: url('/sprites/frog-viking.png');
  background-position: 0px 0px;
  image-rendering: pixelated;
  animation: floatUpDown 5s ease-in-out infinite alternate,
             fadeIn 2s ease-out forwards,
             viking-idle 0.8s steps(4) infinite;
  transform: scale(4);
  transform-origin: center;
  margin-bottom: 20px;
}
@keyframes floatUpDown {
  from { transform: scale(4) translateY(0); }
  to { transform: scale(4) translateY(-15px); }
}
@keyframes viking-idle {
  from { background-position: 0px 0px; }
  to { background-position: 0px -128px; }
}
.bevisible {
  animation: fadeIn 2s ease-out forwards;
  opacity: 0;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
h1 {
  font-size: 48px;
  letter-spacing: 2px;
  margin: 10px 20px;
}
p {
  max-width: 500px;
  margin: 10px 20px;
  font-size: 18px;
  font-family: monospace;
}
a {
  color: #94F1E1;
  font-weight: bold;
}
</style>
</head>
<body>

<div class="greg-viking"></div>
<h1 class="bevisible">GREG</h1>
<p class="bevisible">Welcome to Greg's site! A quick warning before you enter — this game involves repeated death and frog-related judgment.</p>
<p class="bevisible">Click <a href="/main.html">here</a> to continue!</p>

</body>
</html>
