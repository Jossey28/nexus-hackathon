<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bird</title>
<link rel="icon" type="image/png" href="/favicon.png">
<style>
@font-face {
  font-family: 'FF Confidential';
  src: url('/fonts/Confidential-Regular.otf') format('opentype'),
       url('/fonts/Confidential-Regular.ttf') format('truetype');
}
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #000;
  font-family: 'FF Confidential', 'Anton', sans-serif;
  color: white;
  text-align: center;
}
.greg-viking {
  width: 32px;
  height: 32px;
  margin-top: -100px;
  margin-bottom: 40px;
  background-image: url('/sprites/frog-viking.png');
  background-position: 0px 0px;
  image-rendering: pixelated;
  transform: scale(4);
  transform-origin: center;
  animation:
    floatUpDown 5s ease-in-out infinite alternate,
    fadeIn 2s ease-out forwards,
    viking-idle 0.8s steps(4) infinite;
}
@keyframes floatUpDown {
  from { transform: scale(4) translateY(0); }
  to   { transform: scale(4) translateY(-15px); }
}
@keyframes viking-idle {
  from { background-position: 0px 0px; }
  to   { background-position: 0px -128px; }
}
.bevisible {
  opacity: 0;
  animation: fadeIn 2s ease-out forwards;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
h1 {
  margin: 10px 20px;
  padding: 20px 0;
  font-size: 100px;
  letter-spacing: 4px;
  font-style: italic;
  font-weight: bold;
  transform: scaleY(1.3) skewX(-5deg);
  text-shadow: 2px 2px 0 rgba(255,255,255,0.2);
}
p {
  max-width: 800px;
  margin: 10px 20px;
  font-size: 30px;
  font-family: monospace;
}
a {
  color: #94F1E1;
  font-weight: bold;
}
</style>
</head>
<body>

<div class="greg-viking"></div>
<h1 class="bevisible">GREG</h1>
<p class="bevisible">
  Be nice to us folk 🥺✌ we're new here. Combined coding experience:
  about 2 months.
  <br> If you liked this, please vote for us. Every upvote = $1 to charity. We mean it. Trust 🥺
</p>
<p class="bevisible">
  Click <a href="/main.html">here</a> to continue!
</p>

</body>
</html>
